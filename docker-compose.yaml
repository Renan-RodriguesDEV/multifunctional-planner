services:
  
  web:
    build: ./projedata/Dockerfile
    ports:
      - 80:80
    depends_on:
      - db
  db:
    image: mysql:latest
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: db_schedule
      MYSQL_USER: root
      MYSQL_PASSWORD: admin
    ports:
      - 3306:3306
    
  