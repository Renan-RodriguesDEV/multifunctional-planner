<section class="bg-white rounded-lg shadow p-6">
  <header class="flex justify-between items-center mb-6 pb-4 border-b">
    <h1 class="text-2xl font-bold">Eventos</h1>
    <div class="flex gap-2">
      <button
        (click)="form = {}"
        class="px-3 py-2 bg-blue-600 text-white rounded hover:bg-blue-700"
      >
        Novo
      </button>
      <button
        (click)="load()"
        class="px-3 py-2 border border-blue-600 text-blue-600 rounded hover:bg-gray-50"
      >
        Atualizar
      </button>
    </div>
  </header>

  <div class="flex gap-6">
    <!-- Lista de eventos -->
    <div class="flex-1">
      <div *ngIf="events.length === 0" class="text-center py-8 text-gray-500">
        Nenhum evento cadastrado
      </div>
      <ul class="space-y-3">
        <li
          *ngFor="let e of events"
          class="bg-gray-50 p-4 rounded border border-gray-200 hover:border-blue-300 transition"
        >
          <div class="flex justify-between items-start">
            <div class="flex-1">
              <div class="font-bold text-lg">{{ e.name }}</div>
              <div class="text-sm text-gray-600 mt-1">{{ e.description }}</div>
              <div class="text-xs text-gray-500 mt-2">
                📅 {{ e.scheduledAt | date: 'dd/MM/yyyy HH:mm' }}
              </div>
              <div class="text-xs text-gray-500">
                👤 Pessoa ID: {{ e.person_id }} | 📍 Local ID: {{ e.location_id }}
              </div>
              <div class="text-xs text-gray-500">Quantidade: {{ e.count }}</div>
            </div>
            <div class="flex gap-2 ml-4">
              <button
                (click)="edit(e)"
                class="px-3 py-1 text-sm bg-blue-600 text-white rounded hover:bg-blue-700"
              >
                Editar
              </button>
              <button
                (click)="remove(e.id)"
                class="px-3 py-1 text-sm bg-red-600 text-white rounded hover:bg-red-700"
              >
                Deletar
              </button>
            </div>
          </div>
        </li>
      </ul>
    </div>

    <!-- Formulário -->
    <aside
      class="w-96 bg-gradient-to-b from-white to-gray-50 p-5 rounded border border-gray-200 shadow-sm"
    >
      <h3 class="font-bold text-lg mb-4">{{ form.id ? '✏️ Editando' : '➕ Novo' }} evento</h3>
      <form (ngSubmit)="save()" class="space-y-4">
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Nome *</label>
          <input
            name="name"
            [(ngModel)]="form.name"
            placeholder="Ex: Workshop Angular"
            class="w-full px-3 py-2 border border-gray-300 rounded text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Descrição</label>
          <input
            name="description"
            [(ngModel)]="form.description"
            placeholder="Descrição do evento"
            class="w-full px-3 py-2 border border-gray-300 rounded text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Quantidade</label>
          <input
            name="count"
            type="number"
            [(ngModel)]="form.count"
            placeholder="0"
            class="w-full px-3 py-2 border border-gray-300 rounded text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Data e Hora *</label>
          <input
            name="scheduledAt"
            type="datetime-local"
            [(ngModel)]="form.scheduledAt"
            class="w-full px-3 py-2 border border-gray-300 rounded text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Pessoa *</label>
          <select
            name="person_id"
            [(ngModel)]="form.person_id"
            class="w-full px-3 py-2 border border-gray-300 rounded text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          >
            <option value="">Selecione uma pessoa</option>
            <option *ngFor="let p of persons" [value]="p.id">{{ p.name }}</option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Localização *</label>
          <select
            name="location_id"
            [(ngModel)]="form.location_id"
            class="w-full px-3 py-2 border border-gray-300 rounded text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          >
            <option value="">Selecione uma localização</option>
            <option *ngFor="let l of locations" [value]="l.id">{{ l.address }}</option>
          </select>
        </div>

        <div class="flex gap-2 pt-2">
          <button
            type="submit"
            class="flex-1 px-3 py-2 bg-blue-600 text-white text-sm font-semibold rounded hover:bg-blue-700"
          >
            Salvar
          </button>
          <button
            type="button"
            (click)="form = {}"
            class="flex-1 px-3 py-2 border border-gray-300 text-gray-700 text-sm font-semibold rounded hover:bg-gray-100"
          >
            Limpar
          </button>
        </div>
      </form>
    </aside>
  </div>
</section>
